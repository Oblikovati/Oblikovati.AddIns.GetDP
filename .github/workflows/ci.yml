name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

defaults:
  run:
    # bash on every OS for consistent shell semantics (Windows' default pwsh
    # mangles `gotestsum -- -coverprofile=...` and the inline build script).
    shell: bash

# The oblikovati-getdp add-in (module oblikovati.org/getdp). The SHIPPED c-shared
# library links only the Apache-2.0 contract (oblikovati.org/api), pinned in go.mod to the
# latest published API release; the GPL application module (oblikovati.org) is pulled in
# solely by the add-in<->host integration tests. Both are sibling repos wired by the local
# .github/actions/siblings composite (ADR-0018), which checks api out at the pinned release
# so CI validates against exactly what ships.
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - uses: ./.github/actions/siblings
      - uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7
        with:
          version: v2.1.0

  # SPDX: every Go file in this GPL repo must carry GPL-2.0-only.
  spdx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: python3 scripts/add-spdx-headers.py --check

  # Tier 1 — cgo-free unit + add-in<->host integration tests on every OS. The host's
  # headless core is pure Go, so the integration tests (which drive the live
  # router/model) run with CGO_ENABLED=0 on all three platforms.
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - uses: ./.github/actions/siblings
      - run: go install gotest.tools/gotestsum@v1.12.0
      - name: Test
        run: gotestsum --junitfile test-results-${{ matrix.os }}.xml -- -coverprofile=coverage.out -covermode=count ./getdp/... ./gplpurity/...
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: test-results-${{ matrix.os }}
          path: test-results-${{ matrix.os }}.xml

  # Race detector needs cgo; Linux only. ./... includes the root c-shared package, whose
  # export_test.go round-trips Activate/Deactivate against a fake C host call table.
  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - uses: ./.github/actions/siblings
      - run: go test -race ./...

  # Build the SHIPPED add-in: the cgo c-shared library (.so/.dll/.dylib) on every OS.
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - uses: ./.github/actions/siblings
      - name: Build c-shared library
        run: |
          EXT=so
          [ "$RUNNER_OS" = "Windows" ] && EXT=dll
          [ "$RUNNER_OS" = "macOS" ] && EXT=dylib
          echo "building oblikovati-getdp.$EXT"
          mkdir -p build
          go build -buildmode=c-shared -o "build/oblikovati-getdp.$EXT" .
      - uses: actions/upload-artifact@v6
        with:
          name: oblikovati-getdp-${{ matrix.os }}
          path: build/oblikovati-getdp.*

  # Build the vendored solver toolchain from source — GetDP 3.5.0 (SPARSKIT + Arpack +
  # reference LAPACK/BLAS, no PETSc) and gmsh 4.13.1 — and validate each: GetDP solves
  # the hand-written electrokinetic cube exactly (∫v over the unit cube = V0/2 for the
  # linear exact solution), and gmsh tetrahedralizes a box STL. This is the
  # self-contained, no-external-dependency toolchain the add-in ships and runs as
  # subprocesses (vendor-src/{getdp,gmsh}/NOTICE.md).
  # Linux is the gating platform for the from-source solver build; the SHIPPED add-in
  # (the cgo c-shared library) is still validated by the `build` job on all three OSes.
  solvers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install build toolchain
        run: sudo apt-get update && sudo apt-get install -y gfortran cmake
      - name: Build vendored getdp + gmsh
        run: make build-solvers
      - name: Validate getdp solves the electrokinetic cube (∫v must equal 0.5, then 1.0 via -setnumber)
        run: |
          set -euo pipefail
          test -x vendor-src/getdp/build/getdp
          vendor-src/getdp/build/getdp --version
          vendor-src/getdp/build/getdp --info | grep -E "Build options.*Sparskit"
          cp vendor-src/getdp/test/cube.pro vendor-src/getdp/test/cube.msh .
          ./vendor-src/getdp/build/getdp cube.pro -msh cube.msh -solve EleKin -pos Smoke -v 3
          vint=$(awk '{print $2}' vint.txt)
          echo "∫v = $vint (expected 0.5)"
          awk -v v="$vint" 'BEGIN { exit (v > 0.5 - 1e-9 && v < 0.5 + 1e-9) ? 0 : 1 }'
          ./vendor-src/getdp/build/getdp cube.pro -msh cube.msh -solve EleKin -pos Smoke -setnumber V0 2 -v 3
          vint2=$(awk '{print $2}' vint.txt)
          echo "∫v = $vint2 with -setnumber V0 2 (expected 1.0)"
          awk -v v="$vint2" 'BEGIN { exit (v > 1.0 - 1e-9 && v < 1.0 + 1e-9) ? 0 : 1 }'
      - name: Validate gmsh tetrahedralizes a box STL
        run: |
          set -euo pipefail
          test -x vendor-src/gmsh/build/gmsh
          cp vendor-src/gmsh/test/box.stl vendor-src/gmsh/test/box.geo .
          ./vendor-src/gmsh/build/gmsh box.geo -3 -format msh2 -o box.msh
          tets=$(awk '/\$Elements/{f=1;next} /\$EndElements/{f=0} f&&$2==11{n++} END{print n+0}' box.msh)
          echo "second-order tets = $tets"
          [ "$tets" -ge 1 ] || { echo "FAIL: gmsh produced no tets"; exit 1; }
      - uses: actions/upload-artifact@v6
        with:
          name: solvers-linux
          path: |
            vendor-src/getdp/build/getdp
            vendor-src/gmsh/build/gmsh
